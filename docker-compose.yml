services:
  ghr-mongodb:
    image: mongo:8.0
    ports:
      - "${GHR_MONGO_PORT:-27018}:27017"
    volumes:
      - ghr_mongo_data:/data/db
    restart: unless-stopped

  ghr-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${GHR_BACKEND_PORT:-8200}:8000"
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URL=mongodb://ghr-mongodb:27017
    depends_on:
      - ghr-mongodb
    restart: unless-stopped

  ghr-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${GHR_FRONTEND_PORT:-3200}:3000"
    environment:
      - NUXT_BACKEND_URL=http://ghr-backend:8000
    depends_on:
      - ghr-backend
    restart: unless-stopped

volumes:
  ghr_mongo_data:
